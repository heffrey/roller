<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Roller</title>
    <link rel="stylesheet" type="text/css" href="roller.css">
    <script src="roll.js"></script>
  </head>

  <body onload="renderDice()">
      <h1 class="site-title"><span class="site-title-text">ROLLER</span></h1>
      <div class="table-top">
        <div class="dice-area">
          <div class="dice-set">
            <div class="die-group">
              <div class="pct"></div>
              <div class="die-label">(percentile)</div>
            </div>

            <div class="die-group">
              <div class="d20"></div>
              <div class="die-label">(d20)</div>
            </div>

            <div class="die-group">
              <div class="d12"></div>
              <div class="die-label">(d12)</div>
            </div>
          </div>
          <div class="dice-set">
            <div class="die-group">
              <div class="d8"></div>
              <div class="die-label">(d8)</div>
            </div>

            <div class="die-group">
              <div class="d6"></div>
              <div class="die-label">(d6)</div>
            </div>

            <div class="die-group">
              <div class="d4"></div>
              <div class="die-label">(d4)</div>
            </div>
          </div>
        </div>
      </div>
      <div class="dungeon">
        <div class="dungeon-header">Dungeon</div>
        <pre id="dungeon-map" class="dungeon-map"></pre>
        <div id="dungeon-text" class="dungeon-text"></div>
      </div>
      <div class="log">
        <div class="log-header">Roll Log</div>
        <div id="dice-log" class="log-entries"></div>
        <button onclick="logClear()">Clear Log</button>
      </div>
  </body>
</html>
